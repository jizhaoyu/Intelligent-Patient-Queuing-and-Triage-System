server:
  port: 8080

spring:
  application:
    name: triage-queue
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/triage_queue?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:please-change-me}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      timeout: 3s
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-not-delete-value: 0
      logic-delete-value: 1

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

app:
  security:
    jwt-secret: ${JWT_SECRET:PleaseReplaceWithAtLeast32CharsSecretKey}
    jwt-expire-seconds: 28800
    token-prefix: Bearer
  queue:
    recall-limit: 2
    aging-score-per-minute: 2
    estimate-minutes-per-person: 5
    call-next-retry-times: 3
    calling-ttl-seconds: 1800
    allow-dept-fallback: true

logging:
  pattern:
    level: "%5p [%X{traceId}]"
