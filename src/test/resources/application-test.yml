spring:
  datasource:
    url: jdbc:h2:mem:triage_queue;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 1
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/test-data.sql

app:
  security:
    jwt-secret: ReplaceThisJwtSecretKeyWithAtLeast32Chars123456
    jwt-expire-seconds: 28800
    token-prefix: Bearer
  queue:
    recall-limit: 2
    aging-score-per-minute: 2
    estimate-minutes-per-person: 5
    call-next-retry-times: 3
    calling-ttl-seconds: 1800
    allow-dept-fallback: true
